{% extends 'layout/base.html' %}

{% block style %}
{{ block.super }}
<style>
    .section-label {
        font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
        text-transform: uppercase; color: #7A7469; margin-bottom: 10px;
        display: block;
    }
    .radio-group {
        display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 4px;
    }
    .radio-group label {
        display: flex; align-items: center; gap: 8px;
        cursor: pointer; font-size: 14px; color: var(--ink);
        padding: 8px 14px; border: 1.5px solid var(--border);
        border-radius: var(--radius); transition: all 0.15s;
        background: #fff;
    }
    .radio-group input[type="radio"] { accent-color: var(--orange); }
    .radio-group label:has(input:checked) {
        border-color: var(--orange);
        background: #FFF3E0;
        color: var(--orange);
        font-weight: 700;
    }
    .persona-form select {
        width: 100%;
    }
    .save-btn {
        width: 100%; padding: 14px;
        background: var(--orange); color: #fff;
        border: none; border-radius: var(--radius);
        font-family: 'Nunito', sans-serif; font-weight: 900;
        font-size: 15px; cursor: pointer;
        transition: all 0.18s;
        margin-top: 8px;
    }
    .save-btn:hover {
        background: var(--orange-dim);
        transform: translateY(-1px);
    }
    .success-banner {
        background: #EAF5EC; border: 1px solid #A8D8B0;
        border-radius: var(--radius); padding: 12px 16px;
        font-size: 14px; color: #1C6B30; margin-bottom: 16px;
        font-weight: 600;
    }
    .divider { border-top: 1px solid #EEEEEE; margin: 28px 0; }
</style>
{% endblock style %}

{% block content %}
<div class="page-container-narrow">
    <div style="padding: 32px 0 12px">
        <h2 style="font-size:1.4rem; margin-bottom:4px">내 설정</h2>
        <p style="color:#888; font-size:13px; margin:0">
            자주 사용하는 그룹 조건을 저장하면 AI 추천 시 자동으로 반영됩니다.
        </p>
    </div>

    {% if saved %}
    <div class="success-banner">✓ 내 정보가 저장되었습니다. AI 추천에서 이 정보가 자동으로 반영됩니다.</div>
    {% endif %}

    <div class="card" style="padding:32px">
        <form method="post" action="{% url 'recommender:persona' %}" class="persona-form">
            {% csrf_token %}

            <!-- 그룹 인원 -->
            <span class="section-label">주요 그룹 인원</span>
            <select name="groupSize">
                <option value="2"  {% if persona.groupSize == '2' %}selected{% endif %}>2명 (데이트, 소개팅)</option>
                <option value="3"  {% if persona.groupSize == '3' %}selected{% endif %}>3명</option>
                <option value="4"  {% if persona.groupSize == '4' %}selected{% endif %}>4명</option>
                <option value="5"  {% if persona.groupSize == '5' %}selected{% endif %}>5명</option>
                <option value="6"  {% if persona.groupSize == '6' %}selected{% endif %}>6명</option>
                <option value="8"  {% if persona.groupSize == '8' %}selected{% endif %}>8명+ (팀 모임)</option>
            </select>

            <div class="divider"></div>

            <!-- 관계 -->
            <span class="section-label">주요 관계</span>
            <div class="radio-group">
                <label><input type="radio" name="relationship" value="first"       {% if persona.relationship == 'first'       %}checked{% endif %}> 처음 만나는 사이</label>
                <label><input type="radio" name="relationship" value="acquaintance"{% if persona.relationship == 'acquaintance' %}checked{% endif %}> 지인</label>
                <label><input type="radio" name="relationship" value="friends"     {% if persona.relationship == 'friends'      %}checked{% endif %}> 친한 친구</label>
                <label><input type="radio" name="relationship" value="family"      {% if persona.relationship == 'family'       %}checked{% endif %}> 가족</label>
            </div>

            <div class="divider"></div>

            <!-- 공포 수용도 -->
            <span class="section-label">공포 수용도</span>
            <div class="radio-group" style="flex-direction:column">
                <label><input type="radio" name="horrorTolerance" value="high"{% if persona.horrorTolerance == 'high' %}checked{% endif %}> 모두 공포 괜찮음</label>
                <label><input type="radio" name="horrorTolerance" value="low" {% if persona.horrorTolerance == 'low'  %}checked{% endif %}> 일부 민감함 (공포 제외 권장)</label>
                <label><input type="radio" name="horrorTolerance" value="none"{% if persona.horrorTolerance == 'none' %}checked{% endif %}> 전체적으로 피하고 싶음</label>
            </div>

            <div class="divider"></div>

            <!-- 활동성 -->
            <span class="section-label">활동성 선호도</span>
            <div class="radio-group" style="flex-direction:column">
                <label><input type="radio" name="activityLevel" value="low"     {% if persona.activityLevel == 'low'      %}checked{% endif %}> 조용한 활동 선호 (전략 보드게임, 추리)</label>
                <label><input type="radio" name="activityLevel" value="moderate"{% if persona.activityLevel == 'moderate' %}checked{% endif %}> 보통</label>
                <label><input type="radio" name="activityLevel" value="high"    {% if persona.activityLevel == 'high'     %}checked{% endif %}> 활발한 활동 선호 (액션 방탈출, 파티 게임)</label>
            </div>

            <div class="divider"></div>

            <!-- 예산 -->
            <span class="section-label">1인당 예산</span>
            <select name="budget">
                <option value="10000" {% if persona.budget == '10000'  %}selected{% endif %}>~1만원</option>
                <option value="20000" {% if persona.budget == '20000'  %}selected{% endif %}>~2만원</option>
                <option value="30000" {% if persona.budget == '30000'  %}selected{% endif %}>~3만원</option>
                <option value="50000" {% if persona.budget == '50000'  %}selected{% endif %}>~5만원</option>
                <option value="100000"{% if persona.budget == '100000' %}selected{% endif %}>5만원 이상</option>
            </select>

            <div class="divider"></div>

            <button type="submit" class="save-btn">저장하기 →</button>
        </form>
    </div>
</div>
{% endblock %}
