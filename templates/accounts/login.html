{% extends 'layout/base.html' %}

{% block style %}
{{ block.super }}
<style>
    .auth-wrap {
        min-height: calc(100vh - 64px);
        display: flex; align-items: center; justify-content: center;
        padding: 40px 16px;
    }
    .auth-card {
        background: #fff; border: 1px solid var(--border);
        border-radius: var(--radius-lg); padding: 40px 44px;
        width: 100%; max-width: 440px;
        box-shadow: var(--shadow-md);
    }
    .auth-title {
        font-size: 1.5rem; font-weight: 900; color: var(--ink);
        margin-bottom: 6px;
    }
    .auth-sub {
        font-size: 13px; color: var(--muted); margin-bottom: 32px;
    }
    .field-label {
        display: block; font-size: 11px; font-weight: 700;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--ink-soft); margin-bottom: 8px;
    }
    .field-wrap { margin-bottom: 20px; }
    .auth-input {
        width: 100%; padding: 12px 14px;
        border: 1.5px solid var(--border); border-radius: var(--radius);
        font-size: 14px; font-family: 'Nunito', sans-serif;
        color: var(--ink); background: #fff;
        outline: none; transition: border-color 0.15s;
    }
    .auth-input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(43,191,176,0.12);
    }
    .error-banner {
        background: #FEF0EF; border: 1px solid #F0AAAA;
        border-radius: var(--radius); padding: 10px 14px;
        font-size: 13px; color: #9B2218;
        margin-bottom: 20px; font-weight: 600;
    }
    .submit-btn {
        width: 100%; padding: 13px;
        background: var(--orange); color: #fff;
        border: none; border-radius: var(--radius);
        font-family: 'Nunito', sans-serif; font-weight: 900;
        font-size: 15px; cursor: pointer;
        transition: all 0.18s; margin-top: 4px;
    }
    .submit-btn:hover {
        background: var(--orange-dim); transform: translateY(-1px);
    }
    .auth-footer {
        text-align: center; margin-top: 20px;
        font-size: 13px; color: var(--muted);
    }
    .auth-footer a {
        color: var(--orange); font-weight: 700;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .divider {
        display: flex; align-items: center; gap: 12px;
        margin: 24px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
        content: ''; flex: 1; border-top: 1px solid var(--border);
    }
</style>
{% endblock style %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">

        <div style="text-align:center; margin-bottom:28px">
            <a href="{% url 'recommender:home' %}" style="font-family:'Raleway',sans-serif; font-size:1.3rem; font-weight:900; color:var(--orange); letter-spacing:0.1em">
                NOLIT <span style="width:7px;height:7px;border-radius:50%;background:var(--orange);display:inline-block;vertical-align:middle"></span>
            </a>
        </div>

        <div class="auth-title">로그인</div>
        <div class="auth-sub">계속하려면 로그인하세요.</div>

        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="field-wrap">
                <label class="field-label" for="username">아이디</label>
                <input class="auth-input" type="text" id="username" name="username"
                       placeholder="아이디를 입력하세요" autocomplete="username" autofocus>
            </div>

            <div class="field-wrap">
                <label class="field-label" for="password">비밀번호</label>
                <input class="auth-input" type="password" id="password" name="password"
                       placeholder="비밀번호를 입력하세요" autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn">로그인</button>
        </form>

        <div class="divider">또는</div>

        <div class="auth-footer">
            계정이 없으신가요? <a href="{% url 'accounts:signup' %}">회원가입</a>
        </div>
    </div>
</div>
{% endblock content %}
